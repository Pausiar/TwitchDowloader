<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Vista de Twitch VOD Downloader</title>
  <desc id="desc">Captura de la interfaz real de la aplicacion Twitch VOD Downloader con campo de URL, carpeta de destino, boton de descarga y seccion de progreso.</desc>
  <defs>
    <filter id="winshadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00000040" />
    </filter>
  </defs>

  <!-- Fondo escritorio -->
  <rect width="1280" height="760" fill="#e8e8e8" />

  <!-- Ventana Windows: sombra -->
  <rect x="368" y="148" width="544" height="464" rx="0" fill="#ffffff" filter="url(#winshadow)" />

  <!-- Marco ventana -->
  <rect x="370" y="150" width="540" height="460" fill="#ffffff" stroke="#adadad" stroke-width="1" />

  <!-- Barra de título -->
  <rect x="370" y="150" width="540" height="30" fill="#f0f0f0" />
  <line x1="370" y1="180" x2="910" y2="180" stroke="#adadad" stroke-width="1" />

  <!-- Icono + texto título en barra -->
  <text x="385" y="170" font-family="Segoe UI Emoji, Arial, sans-serif" font-size="14">🎮</text>
  <text x="404" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#333333">Twitch VOD Downloader</text>

  <!-- Botones de ventana (─ □ ✕) -->
  <rect x="772" y="150" width="46" height="30" fill="transparent" />
  <text x="795" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#444">─</text>
  <rect x="818" y="150" width="46" height="30" fill="transparent" />
  <rect x="836" y="159" width="10" height="10" fill="none" stroke="#444" stroke-width="1" />
  <rect x="864" y="150" width="46" height="30" fill="transparent" />
  <text x="887" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#444">✕</text>

  <!-- Cuerpo blanco -->
  <rect x="370" y="180" width="540" height="430" fill="#ffffff" />

  <!-- Título principal -->
  <text x="640" y="225" text-anchor="middle" font-family="Segoe UI Emoji, Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#1a1a1a">🎮 Twitch VOD Downloader</text>

  <!-- Sección: Link del VOD -->
  <rect x="390" y="242" width="500" height="82" fill="#ffffff" stroke="#d0d0d0" stroke-width="1" />
  <text x="403" y="262" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1a1a1a">Link del VOD de Twitch</text>
  <rect x="403" y="268" width="474" height="28" fill="#ffffff" stroke="#7b7b7b" stroke-width="1" />
  <text x="408" y="286" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#a8a8a8">Ejemplo: https://www.twitch.tv/videos/123456789</text>

  <!-- Sección: Carpeta de destino -->
  <rect x="390" y="340" width="500" height="72" fill="#ffffff" stroke="#d0d0d0" stroke-width="1" />
  <text x="403" y="358" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1a1a1a">Carpeta de destino</text>
  <rect x="403" y="364" width="388" height="28" fill="#ffffff" stroke="#7b7b7b" stroke-width="1" />
  <text x="408" y="382" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#1a1a1a">C:\Users\Pau\Downloads</text>
  <rect x="798" y="364" width="80" height="28" rx="2" fill="#e1e1e1" stroke="#adadad" stroke-width="1" />
  <text x="838" y="382" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1a1a1a">Examinar...</text>

  <!-- Botón Descargar -->
  <rect x="440" y="432" width="360" height="42" rx="2" fill="#f0f0f0" stroke="#adadad" stroke-width="1" />
  <text x="620" y="457" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500" fill="#1a1a1a">↓  Descargar en Máxima Calidad</text>

  <!-- Sección: Progreso -->
  <text x="390" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1a1a1a">Progreso</text>
  <rect x="390" y="506" width="500" height="22" fill="#ffffff" stroke="#d0d0d0" stroke-width="1" />
</svg>
