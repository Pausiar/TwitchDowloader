name: Build and Release Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name TwitchDownloader --icon assets/logo.ico --add-data "assets/logo.ico;assets" twitch_downloader.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TwitchDownloader-windows
          path: dist/TwitchDownloader.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: TwitchDownloader ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/TwitchDownloader.exe